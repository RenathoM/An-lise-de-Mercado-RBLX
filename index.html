<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Terminal Ultra | Institutional Grade</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #06090f; --bg-card: #0d1117; --border: #30363d;
            --cyan: #00f5d4; --blue: #3b82f6; --up: #22c55e; --down: #ef4444;
            --text: #c9d1d9; --text-dim: #8b949e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-main); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .sidebar { width: 280px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .viewport { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header & Nav */
        .header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: var(--bg-card); }
        .timeframes { display: flex; gap: 5px; background: var(--bg-main); padding: 4px; border-radius: 6px; }
        .tf-btn { background: transparent; border: none; color: var(--text-dim); padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .tf-btn.active { background: var(--border); color: var(--cyan); }

        /* Grid System */
        .main-grid { display: grid; grid-template-columns: 1fr 320px; grid-template-rows: 1fr 250px; gap: 1px; background: var(--border); flex: 1; }
        .cell { background: var(--bg-main); overflow: hidden; position: relative; display: flex; flex-direction: column; }
        
        /* Chart Customization */
        #mainChartContainer { grid-column: 1; grid-row: 1; padding: 15px; }
        .trade-panel { grid-column: 2; grid-row: 1 / span 2; background: var(--bg-card); padding: 20px; }
        .watchlist-panel { grid-column: 1; grid-row: 2; padding: 15px; background: var(--bg-card); }

        /* Watchlist Table */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { color: var(--text-dim); text-align: left; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(48, 54, 61, 0.5); cursor: pointer; }
        tr:hover { background: rgba(255,255,255,0.03); }
        tr.selected { background: rgba(0, 245, 212, 0.05); border-left: 3px solid var(--cyan); }

        /* Buy/Sell Popup Animation */
        .trade-popup {
            position: absolute; padding: 10px 20px; border-radius: 8px; font-weight: bold;
            color: white; z-index: 100; pointer-events: none; animation: popupMove 1.5s ease-out forwards;
        }
        @keyframes popupMove {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        /* Buttons */
        .action-btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-buy { background: var(--up); color: #fff; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        .btn-sell { background: var(--down); color: #fff; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        
        /* IA Insights */
        .ia-card { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--blue); padding: 15px; border-radius: 8px; margin-top: 20px; }
        .ia-status { font-size: 12px; color: var(--blue); margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="padding: 20px; font-size: 1.4rem; font-weight: 900; color: var(--cyan);">ATLAS <span style="color:#fff">PRO</span></div>
    <div style="padding: 10px 20px;">
        <p style="font-size: 11px; color: var(--text-dim);">CONEXÃO SUPABASE</p>
        <div id="conn-status" style="display: flex; align-items: center; gap: 8px; margin-top: 5px; font-size: 13px;">
            <div style="width:8px; height:8px; border-radius:50%; background: orange;"></div> Conectando...
        </div>
    </div>
</div>

<div class="viewport">
    <div class="header">
        <div id="active-asset-info">
            <span id="active-name" style="font-weight: bold; font-size: 18px;">Carregando...</span>
            <span id="active-ticker" style="color: var(--text-dim); margin-left: 10px;">---</span>
        </div>
        <div class="timeframes">
            <button class="tf-btn active" onclick="changeTF('1M')">1M</button>
            <button class="tf-btn" onclick="changeTF('1H')">1H</button>
            <button class="tf-btn" onclick="changeTF('1D')">1D</button>
            <button class="tf-btn" onclick="changeTF('1W')">1W</button>
        </div>
    </div>

    <div class="main-grid">
        <div class="cell" id="mainChartContainer">
            <canvas id="mainChart"></canvas>
        </div>

        <div class="trade-panel">
            <div style="margin-bottom: 20px;">
                <p style="color: var(--text-dim); font-size: 12px;">PREÇO ATUAL (CCU)</p>
                <h1 id="live-price" style="font-size: 42px; font-variant-numeric: tabular-nums;">0</h1>
                <p id="price-delta" style="font-weight: bold;">+0.00%</p>
            </div>

            <button class="action-btn btn-buy" onclick="spawnTrade('BUY')">COMPRAR (LONG)</button>
            <button class="action-btn btn-sell" onclick="spawnTrade('SELL')">VENDER (SHORT)</button>

            <div class="ia-card">
                <div class="ia-status"><i class="fas fa-brain"></i> Projeção IA Atlas</div>
                <p id="ia-prediction" style="font-size: 13px;">Analisando padrões de volume...</p>
                <div id="ia-target" style="margin-top: 10px; font-weight: bold; color: var(--cyan);">--</div>
            </div>
        </div>

        <div class="watchlist-panel">
            <table>
                <thead>
                    <tr><th>Ativo</th><th>Volume (CCU)</th><th>Trend 24h</th><th>Status</th></tr>
                </thead>
                <tbody id="watchlist-body">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Configurações de API
    const SUPABASE_URL = "https://xjgdtwevqrrnorgzelrz.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqZ2R0d2V2cXJybm9yZ3plbHJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzk3ODAsImV4cCI6MjA4OTYxNTc4MH0.XGmwAxTNWghMRzTDMZvu5IXHmHy_7Xw54RjdPzqa-Dw";
    
    const GAMES = [
        { id: 1119586118, name: "Blox Fruits", ticker: "BLXF" },
        { id: 1702695413, name: "Brookhaven", ticker: "BRKH" },
        { id: 332284684, name: "Adopt Me!", ticker: "ADPT" },
        { id: 66654135, name: "Murder Mystery 2", ticker: "MM2X" },
        { id: 2603415162, name: "BedWars", ticker: "BEDW" },
        { id: 4982631553, name: "Pet Simulator 99", ticker: "PETS" }
    ];

    let currentTF = '1M';
    let selectedId = GAMES[0].id;
    let chart;
    let marketData = {};

    // Inicializar Estrutura de Dados
    GAMES.forEach(g => {
        marketData[g.id] = {
            ccu: 0,
            history: Array.from({length: 50}, () => Math.floor(Math.random() * 50000 + 20000)),
            lastUpdate: Date.now()
        };
    });

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(50).fill(''),
                datasets: [{
                    label: 'Live CCU',
                    data: marketData[selectedId].history,
                    borderColor: '#00f5d4',
                    borderWidth: 3,
                    pointRadius: 0,
                    tension: 0.4,
                    fill: { target: 'origin', above: 'rgba(0, 245, 212, 0.05)' }
                }, {
                    label: 'IA Projection',
                    data: Array(50).fill(null),
                    borderColor: '#3b82f6',
                    borderDash: [5, 5],
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: '#30363d' }, position: 'right' },
                    x: { display: false }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    async function fetchData() {
        try {
            // Chamada individual para evitar erro de lote
            for (let game of GAMES) {
                const res = await fetch(`${SUPABASE_URL}/functions/v1/roblox-proxy?universeIds=${game.id}`, {
                    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
                });
                const json = await res.json();
                
                if (json.data && json.data[0]) {
                    const realCcu = json.data[0].playing;
                    updateAssetData(game.id, realCcu);
                }
            }
            document.getElementById('conn-status').innerHTML = `<div style="width:8px; height:8px; border-radius:50%; background: #22c55e;"></div> Sistema Live`;
        } catch (e) {
            console.error("Erro na busca:", e);
        }
    }

    function updateAssetData(id, ccu) {
        const data = marketData[id];
        data.ccu = ccu;
        data.history.push(ccu);
        data.history.shift();

        if (id === selectedId) {
            document.getElementById('live-price').innerText = ccu.toLocaleString();
            updateIA(data.history);
        }
        renderWatchlist();
    }

    function updateIA(history) {
        // Algoritmo de Previsão ATLAS
        const last = history[history.length - 1];
        const prev = history[history.length - 10];
        const diff = last - prev;
        const trend = diff > 0 ? "ALTA" : "BAIXA";
        
        // Projeção baseada no timeframe selecionado
        let projection;
        const timeframeMap = { '1M': 1, '1H': 60, '1D': 1440, '1W': 10080 };
        const multiplier = timeframeMap[currentTF];
        
        projection = last + (diff * 0.5);

        document.getElementById('ia-prediction').innerText = `Tendência de ${trend} detectada no timeframe ${currentTF}.`;
        document.getElementById('ia-target').innerText = `ALVO ESTIMADO: ${Math.round(projection).toLocaleString()} CCU`;
        
        // Atualiza a linha tracejada do gráfico
        const iaData = Array(50).fill(null);
        iaData[49] = last;
        iaData.push(projection);
        chart.data.datasets[1].data = iaData;
        chart.update('none');
    }

    function renderWatchlist() {
        const body = document.getElementById('watchlist-body');
        body.innerHTML = '';
        GAMES.forEach(g => {
            const data = marketData[g.id];
            const tr = document.createElement('tr');
            if (g.id === selectedId) tr.className = 'selected';
            tr.onclick = () => selectAsset(g.id);
            tr.innerHTML = `
                <td>${g.name} <span style="color:var(--text-dim)">${g.ticker}</span></td>
                <td style="font-weight:bold">${data.ccu.toLocaleString()}</td>
                <td style="color:${data.ccu > 30000 ? 'var(--up)' : 'var(--down)'}">${data.ccu > 30000 ? '▲ UP' : '▼ DOWN'}</td>
                <td><span style="padding:2px 6px; background:rgba(0,245,212,0.1); color:var(--cyan); border-radius:4px; font-size:10px;">ESTÁVEL</span></td>
            `;
            body.appendChild(tr);
        });
    }

    function selectAsset(id) {
        selectedId = id;
        const game = GAMES.find(g => g.id === id);
        document.getElementById('active-name').innerText = game.name;
        document.getElementById('active-ticker').innerText = `$${game.ticker}`;
        chart.data.datasets[0].data = marketData[id].history;
        chart.update();
        renderWatchlist();
    }

    function changeTF(tf) {
        currentTF = tf;
        document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        // No mundo real, aqui você buscaria dados históricos do Supabase Table. 
        // Para este terminal, estamos simulando a compressão visual.
        showToast(`Timeframe alterado para ${tf}. Recalculando IA...`);
    }

    function spawnTrade(type) {
        const price = document.getElementById('live-price');
        const rect = price.getBoundingClientRect();
        
        const popup = document.createElement('div');
        popup.className = 'trade-popup';
        popup.style.left = (rect.left + window.scrollX) + 'px';
        popup.style.top = (rect.top + window.scrollY) + 'px';
        popup.style.background = type === 'BUY' ? 'var(--up)' : 'var(--down)';
        popup.innerText = `${type} @ ${marketData[selectedId].ccu}`;
        
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 1500);
        
        showToast(`Ordem de ${type} executada com sucesso.`);
    }

    function showToast(msg) {
        console.log("Terminal Log:", msg);
    }

    // Inicialização
    initChart();
    fetchData();
    setInterval(fetchData, 30000); // Atualiza dados reais a cada 30s
    
    // Simulação de movimento por segundo (Smooth Chart)
    setInterval(() => {
        const data = marketData[selectedId];
        const noise = (Math.random() - 0.5) * 50;
        const smoothVal = data.ccu + noise;
        data.history.push(smoothVal);
        data.history.shift();
        chart.update('none');
    }, 1000);

</script>
</body>
</html>
